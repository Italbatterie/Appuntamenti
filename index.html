<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Accesso — Modulo Appuntamenti</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Inter+Tight:wght@700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue:      #00475d;
      --blue-dark: #003347;
      --accent:    #00b4d8;
      --white:     #ffffff;
      --gray-900:  #1c2b30;
      --gray-500:  #6b8a92;
      --gray-300:  #c4d5d9;
      --gray-100:  #eef4f6;
      --gray-50:   #f7fafb;
      --error:     #9b2c2c;
      --error-bg:  #fdf0f0;
      --error-bd:  #f5bbbb;
      --radius-md: 10px;
      --radius-lg: 16px;
    }
    html, body {
      min-height: 100vh;
      background: var(--gray-100);
      font-family: 'Inter', sans-serif;
      color: var(--gray-900);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--blue) 0%, var(--accent) 50%, var(--blue) 100%);
      background-size: 200% 100%;
      animation: shimmer 3s linear infinite;
    }
    @keyframes shimmer {
      from { background-position: 200% 0; }
      to   { background-position: -200% 0; }
    }
    .login-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      box-shadow: 0 4px 32px rgba(0,71,93,0.11), 0 1px 4px rgba(0,71,93,0.06);
      overflow: hidden;
      width: 100%;
      max-width: 420px;
      animation: fadeUp 0.35s ease both;
    }
    @keyframes fadeUp {
      from { opacity:0; transform: translateY(14px); }
      to   { opacity:1; transform: translateY(0); }
    }
    .login-header {
      background: var(--blue);
      padding: 2rem 2rem 1.75rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .login-header::after {
      content: '';
      position: absolute; right: -40px; top: -40px;
      width: 160px; height: 160px; border-radius: 50%;
      background: rgba(255,255,255,0.04);
      pointer-events: none;
    }
    .login-logo {
      width: 72px; height: 72px;
      background: var(--white);
      border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1rem;
    }
    .login-logo img { height: 52px; width: auto; display: block; }
    .login-title {
      font-family: 'Inter Tight', sans-serif;
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--white);
    }
    .login-sub {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.55);
      margin-top: 4px;
    }
    .login-body { padding: 2rem; }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-bottom: 1rem;
    }
    label {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--gray-500);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    input {
      width: 100%;
      padding: 10px 13px;
      font-size: 0.92rem;
      font-family: 'Inter', sans-serif;
      border: 1.5px solid var(--gray-300);
      border-radius: var(--radius-md);
      background: var(--gray-50);
      color: var(--gray-900);
      outline: none;
      transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
      -webkit-appearance: none;
    }
    input:focus {
      border-color: var(--blue);
      background: var(--white);
      box-shadow: 0 0 0 3px rgba(0,71,93,0.10);
    }
    .btn-login {
      width: 100%;
      margin-top: 0.25rem;
      padding: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      background: var(--blue);
      color: var(--white);
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-login:hover  { background: var(--blue-dark); }
    .btn-login:active { transform: scale(0.99); }
    .btn-login:disabled { background: var(--gray-300); cursor: not-allowed; }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: var(--white);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-msg {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 10px 13px;
      background: var(--error-bg);
      color: var(--error);
      border: 1px solid var(--error-bd);
      border-radius: var(--radius-md);
      font-size: 0.84rem;
      font-weight: 500;
      margin-top: 0.75rem;
      animation: fadeUp 0.2s ease both;
    }
    .error-msg.show { display: flex; }
    .login-footer {
      padding: 0.9rem 2rem;
      background: var(--gray-50);
      border-top: 1px solid var(--gray-100);
      text-align: center;
      font-size: 0.72rem;
      color: var(--gray-500);
    }
  </style>
</head>
<body>
  <div class="topbar"></div>

  <div class="login-card">
    <div class="login-header">
      <div class="login-logo">
        <img src="Logo_Nuovo.png" alt="Italbatterie"
             onerror="this.style.display='none'"/>
      </div>
      <div class="login-title">Modulo Appuntamenti</div>
      <div class="login-sub">Accesso riservato al personale</div>
    </div>

    <div class="login-body">
      <form id="login-form" autocomplete="off">
        <div class="form-group">
          <label for="username">Utente</label>
          <input type="text" id="username" placeholder="Nome utente"
                 autocomplete="username" required/>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••"
                 autocomplete="current-password" required/>
        </div>
        <button type="submit" class="btn-login" id="login-btn">
          <span id="login-text">Accedi</span>
          <span class="spinner" id="login-spinner"></span>
        </button>
        <div class="error-msg" id="error-msg">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <circle cx="7" cy="7" r="6" stroke="currentColor" stroke-width="1.5"/>
            <path d="M7 4v4M7 10v.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          Utente o password non corretti.
        </div>
      </form>
    </div>

    <div class="login-footer">Italbatterie &copy; 2025 &middot; Accesso protetto</div>
  </div>

  <script>
    // If already logged in redirect immediately
    (function() {
      try {
        var s = JSON.parse(sessionStorage.getItem('ib_auth') || 'null');
        if (s && s.ok && Date.now() < s.exp) window.location.replace('form.html');
      } catch(e) {}
    })();

    // SHA-256 via SubtleCrypto — password never stored or visible in plain text
    async function sha256(str) {
      var buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf))
        .map(function(b) { return b.toString(16).padStart(2,'0'); }).join('');
    }

    function getUsers() {
      try { return JSON.parse(localStorage.getItem('ib_users') || '[]'); }
      catch(e) { return []; }
    }

    var loginBtn  = document.getElementById('login-btn');
    var loginText = document.getElementById('login-text');
    var spinner   = document.getElementById('login-spinner');
    var errMsg    = document.getElementById('error-msg');

    document.getElementById('login-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      errMsg.classList.remove('show');
      loginBtn.disabled = true;
      loginText.style.display = 'none';
      spinner.style.display = 'inline-block';

      var username = document.getElementById('username').value.trim().toLowerCase();
      var password = document.getElementById('password').value;
      var hash     = await sha256(password);
      var users    = getUsers();
      var match    = null;

      if (users.length === 0) {
        // Default credentials if admin hasn't set up users yet
        var defHash = await sha256('Italbatterie2025!');
        if (username === 'admin' && hash === defHash) {
          match = { username: 'admin', role: 'admin' };
        }
      } else {
        match = users.find(function(u) {
          return u.username.toLowerCase() === username
              && u.hash === hash
              && u.active !== false;
        }) || null;
      }

      if (match) {
        sessionStorage.setItem('ib_auth', JSON.stringify({
          ok: true, user: match.username, role: match.role || 'user',
          exp: Date.now() + 8 * 60 * 60 * 1000   // sessione 8 ore
        }));
        window.location.replace('form.html');
      } else {
        errMsg.classList.add('show');
        loginBtn.disabled = false;
        loginText.style.display = '';
        spinner.style.display = 'none';
      }
    });
  </script>
</body>
</html>
